name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve frontend env
        run: |
          URL="${{ vars.VITE_API_BASE_URL }}"
          if [ -z "$URL" ]; then
            URL="${{ secrets.VITE_API_BASE_URL }}"
          fi
          if [ -z "$URL" ]; then
            echo "VITE_API_BASE_URL is not set."
            echo "Set repository variable OR repository secret VITE_API_BASE_URL."
            echo "Example: https://daily-worklog-api.onrender.com/api"
            exit 1
          fi
          echo "VITE_API_BASE_URL=$URL" >> $GITHUB_ENV
          echo "VITE_API_TIMEOUT_MS=10000" >> $GITHUB_ENV
          echo "VITE_API_USE_LOCAL_FALLBACK=false" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
