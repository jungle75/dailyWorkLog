services:
  - type: web
    name: daily-worklog-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run api:start
    autoDeploy: true
    healthCheckPath: /api/work-entries/assignees
    envVars:
      - key: API_BASE_PATH
        value: /api
      - key: CORS_ORIGIN
        value: https://jungle75.github.io,http://localhost:5173
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TABLE
        value: work_entries
      - key: DATA_FILE
        value: /tmp/work-entries.json
